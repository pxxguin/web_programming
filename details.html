<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스마트 가계부 - 상세내역</title>
    <meta name="description" content="전체 수입/지출 상세 내역 관리">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Pretendard:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="header">
        <div class="header-container">
            <div class="logo">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="logo-icon"><rect x="2" y="4" width="20" height="16" rx="2" ry="2"></rect><line x1="2" y1="10" x2="22" y2="10"></line></svg>
                <h1>AssetFlow</h1>
            </div>
            <nav class="nav-links">
                <a href="index.html">대시보드</a>
                <a href="details.html" class="active">상세내역</a>
                <a href="calendar.html">달력</a>
                <a href="assets.html">자산관리</a>
            </nav>
            <div class="header-actions">
                <button id="themeToggle" class="icon-btn" aria-label="다크모드 토글">
                    <svg class="sun-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                    <svg class="moon-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: none;"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                </button>
                <button id="mobileMenuBtn" class="icon-btn mobile-only" aria-label="메뉴 토글">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                </button>
            </div>
        </div>
    </header>

    <div class="mobile-nav" id="mobileNav">
        <a href="index.html">대시보드</a>
        <a href="details.html" class="active">상세내역</a>
        <a href="calendar.html">달력</a>
        <a href="assets.html">자산관리</a>
    </div>

    <main class="container">
        <div class="details-wrapper">
            <!-- Filter Section -->
            <section class="filter-section card glass">
                <div class="filter-group search-group" style="flex: 1;">
                    <label for="searchInput">검색</label>
                    <div class="input-with-icon" style="width: 100%;">
                        <span class="currency-symbol" style="font-size: 0.9rem;">🔍</span>
                        <input type="text" id="searchInput" placeholder="메모 또는 금액 검색" style="padding-left: 2.2rem; width: 100%;">
                    </div>
                </div>
                
                <div class="filter-group">
                    <label for="filterType">유형 필터</label>
                    <select id="filterType">
                        <option value="all">전체 내역</option>
                        <option value="income">수입만 보기</option>
                        <option value="expense">지출만 보기</option>
                    </select>
                </div>
                
                <div class="filter-group">
                    <label for="filterCategory">카테고리</label>
                    <select id="filterCategory">
                        <option value="all">모든 카테고리</option>
                        <option value="식비">식비</option>
                        <option value="교통">교통비</option>
                        <option value="쇼핑">쇼핑</option>
                        <option value="주거">주거/통신</option>
                        <option value="문화">문화/여가</option>
                        <option value="급여">급여</option>
                        <option value="기타">기타</option>
                    </select>
                </div>
            </section>

            <!-- List Section -->
            <section class="full-list-section card glass">
                <div class="card-header">
                    <h2>전체 거래 내역</h2>
                    <span class="count-badge" id="listCount">0건</span>
                </div>
                <div class="list-container">
                    <ul id="fullList" class="transaction-list">
                        <!-- JS injected items -->
                    </ul>
                    <div id="emptyStateMessage" class="empty-state" style="display: none;">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="8" y1="12" x2="16" y2="12"></line></svg>
                        <p>해당하는 내역이 없습니다.</p>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <!-- Floating Action Button -->
    <button class="fab" id="addBtn" aria-label="내역 추가">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
    </button>

    <!-- Add Transaction Modal (공통) -->
    <div class="modal-overlay" id="addModal">
        <div class="modal-content glass-modal">
            <div class="modal-header">
                <h2>새 내역 추가</h2>
                <button class="close-btn" id="closeModal">&times;</button>
            </div>
            <form id="transactionForm">
                <div class="form-group type-selector">
                    <input type="radio" id="typeExpense" name="type" value="expense" checked>
                    <label for="typeExpense" class="type-btn expense-btn">지출</label>
                    <input type="radio" id="typeIncome" name="type" value="income">
                    <label for="typeIncome" class="type-btn income-btn">수입</label>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="amount">금액</label>
                        <div class="input-with-icon">
                            <span class="currency-symbol">₩</span>
                            <input type="number" id="amount" required placeholder="0" min="1">
                        </div>
                    </div>
                </div>

                <div class="form-row split">
                    <div class="form-group">
                        <label for="date">날짜</label>
                        <input type="date" id="date" required>
                    </div>
                    <div class="form-group">
                        <label for="category">카테고리</label>
                        <select id="category" required>
                            <option value="식비">🍔 식비</option>
                            <option value="교통">🚌 교통비</option>
                            <option value="쇼핑">🛍️ 쇼핑</option>
                            <option value="주거">🏠 주거/통신</option>
                            <option value="문화">🍿 문화/여가</option>
                            <option value="급여">💰 급여</option>
                            <option value="기타">✨ 기타</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="memo">메모</label>
                    <input type="text" id="memo" placeholder="어디서 사용하셨나요?" autocomplete="off">
                </div>
                
                <div class="modal-actions">
                    <button type="submit" class="submit-btn">저장하기</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Chart.js is not needed on details page, but app.js will still run. We can handle it in app.js if chart doesn't exist. -->
    <script src="js/app.js"></script>
</body>
</html>
