<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스마트 가계부 - 자산관리</title>
    <meta name="description" content="적금, 예금 및 고정 지출 관리">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Pretendard:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="header">
        <div class="header-container">
            <div class="logo">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="logo-icon"><rect x="2" y="4" width="20" height="16" rx="2" ry="2"></rect><line x1="2" y1="10" x2="22" y2="10"></line></svg>
                <h1>AssetFlow</h1>
            </div>
            <nav class="nav-links">
                <a href="index.html">대시보드</a>
                <a href="details.html">상세내역</a>
                <a href="calendar.html">달력</a>
                <a href="assets.html" class="active">자산관리</a>
            </nav>
            <div class="header-actions">
                <button id="themeToggle" class="icon-btn" aria-label="다크모드 토글">
                    <svg class="sun-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                    <svg class="moon-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: none;"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                </button>
                <button id="mobileMenuBtn" class="icon-btn mobile-only" aria-label="메뉴 토글">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                </button>
            </div>
        </div>
    </header>

    <div class="mobile-nav" id="mobileNav">
        <a href="index.html">대시보드</a>
        <a href="details.html">상세내역</a>
        <a href="calendar.html">달력</a>
        <a href="assets.html" class="active">자산관리</a>
    </div>

    <main class="container">
        <div class="dashboard-content">
            <!-- 자산 리스트 -->
            <section class="recent-transactions card glass" style="grid-column: span 1;">
                <div class="card-header">
                    <h2>등록된 자산</h2>
                    <button id="openAssetBtn" class="icon-btn" style="font-size: 1.5rem; color: var(--primary-color);">+</button>
                </div>
                <ul id="assetList" class="transaction-list">
                    <!-- JS injected -->
                </ul>
            </section>

            <!-- 고정지출 리스트 -->
            <section class="recent-transactions card glass" style="grid-column: span 1;">
                <div class="card-header">
                    <h2>고정 지출</h2>
                    <button id="openFixedExpenseBtn" class="icon-btn" style="font-size: 1.5rem; color: var(--expense-color);">+</button>
                </div>
                <ul id="fixedExpenseList" class="transaction-list">
                    <!-- JS injected -->
                </ul>
            </section>
        </div>
    </main>

    <!-- 자산 추가 모달 -->
    <div class="modal-overlay" id="assetModal">
        <div class="modal-content glass-modal">
            <div class="modal-header">
                <h2>자산 등록</h2>
                <button class="close-btn" id="closeAssetModal">&times;</button>
            </div>
            <form id="assetForm">
                <div class="form-group">
                    <label for="assetType">유형</label>
                    <select id="assetType" required>
                        <option value="적금">적금</option>
                        <option value="예금">예금</option>
                        <option value="자유저금통장">자유저금통장</option>
                        <option value="입출금">일반 입출금</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="assetBank">은행명</label>
                    <input type="text" id="assetBank" required placeholder="예: 신한은행">
                </div>
                <div class="form-group">
                    <label for="assetName">상품명</label>
                    <input type="text" id="assetName" required placeholder="예: 청년도약계좌">
                </div>
                <div class="form-group">
                    <label for="assetAmount">현재 금액</label>
                    <div class="input-with-icon">
                        <span class="currency-symbol">₩</span>
                        <input type="number" id="assetAmount" required placeholder="0" min="0">
                    </div>
                </div>
                <div class="modal-actions">
                    <button type="submit" class="submit-btn">등록하기</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 고정지출 추가 모달 -->
    <div class="modal-overlay" id="fixedExpenseModal">
        <div class="modal-content glass-modal">
            <div class="modal-header">
                <h2>고정 지출 등록</h2>
                <button class="close-btn" id="closeFixedExpenseModal">&times;</button>
            </div>
            <form id="fixedExpenseForm">
                <div class="form-group">
                    <label for="feName">지출명</label>
                    <input type="text" id="feName" required placeholder="예: 넷플릭스 구독">
                </div>
                <div class="form-row split">
                    <div class="form-group">
                        <label for="feAmount">금액</label>
                        <input type="number" id="feAmount" required placeholder="0" min="1">
                    </div>
                    <div class="form-group">
                        <label for="feCategory">카테고리</label>
                        <select id="feCategory" required>
                            <option value="주거">🏠 주거/통신</option>
                            <option value="문화">🍿 문화/여가</option>
                            <option value="교통">🚌 교통비</option>
                            <option value="기타">✨ 기타</option>
                        </select>
                    </div>
                </div>
                <div class="form-row split">
                    <div class="form-group">
                        <label for="feDay">매월 결제일 (일)</label>
                        <input type="number" id="feDay" required placeholder="예: 15" min="1" max="31">
                    </div>
                    <div class="form-group">
                        <label for="feStart">시작일</label>
                        <input type="date" id="feStart" required>
                    </div>
                </div>
                <div class="modal-actions">
                    <button type="submit" class="submit-btn" style="background: var(--expense-color);">등록하기</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Chart.js and script -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
